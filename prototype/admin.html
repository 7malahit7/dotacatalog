<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка - Dota Relics Catalog</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <header class="site-header">
        <a class="logo" href="index.html">Dota Relics</a>
        <nav class="main-nav">
            <a href="index.html">Каталог</a>
            <a href="admin.html">Админка</a>
        </nav>
    </header>

    <main class="admin-page">
        <div class="admin-header">
            <div>
                <h1>Управление предметами</h1>
                <p>Прототип открытой админки без авторизации.</p>
            </div>
            <a class="button" href="admin-form.html">Добавить предмет</a>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Герой</th>
                    <th>Редкость</th>
                    <th>Цена</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Manifold Paradox</td>
                    <td>Phantom Assassin</td>
                    <td>Immortal</td>
                    <td>2499 ₽</td>
                    <td>
                        <a href="admin-form.html">Редактировать</a>
                        <button type="button" data-delete data-remove-row="true" data-item-name="Manifold Paradox">Удалить</button>
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Demon Eater</td>
                    <td>Shadow Fiend</td>
                    <td>Arcana</td>
                    <td>1790 ₽</td>
                    <td>
                        <a href="admin-form.html">Редактировать</a>
                        <button type="button" data-delete data-remove-row="true" data-item-name="Demon Eater">Удалить</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <script src="../static/js/app.js"></script>
</body>
</html>
